<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brew & Bloom | Artisan Coffee Shop</title>
    
    <!-- Primary Meta Tags -->
    <meta name="title" content="Brew & Bloom | Artisan Coffee Shop" />
    <meta name="description" content="Brew & Bloom is your local artisan coffee shop in Portland. We serve ethically sourced, freshly roasted specialty coffee and fresh pastries in a warm, welcoming atmosphere." />
    <meta name="keywords" content="coffee shop, Portland coffee, artisan coffee, specialty coffee, ethically sourced coffee, espresso, lattes, fresh pastries, Brew and Bloom, cafe" />
    <meta name="author" content="Brew & Bloom" />
    <meta name="theme-color" content="#EAE4D9" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://brewandbloom.com/" />
    <meta property="og:title" content="Brew & Bloom | Artisan Coffee Shop" />
    <meta property="og:description" content="Artisan coffee shop serving ethically sourced, freshly roasted coffee in a warm, welcoming atmosphere." />
    <!-- Use the hero image for social sharing -->
    <meta property="og:image" content="https://brewandbloom.com/hero-bg.jpg" />
    <meta property="og:image:alt" content="Brew & Bloom Warm Coffee Shop Interior" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://brewandbloom.com/" />
    <meta property="twitter:title" content="Brew & Bloom | Artisan Coffee Shop" />
    <meta property="twitter:description" content="Artisan coffee shop serving ethically sourced, freshly roasted coffee in a warm, welcoming atmosphere." />
    <meta property="twitter:image" content="https://brewandbloom.com/hero-bg.jpg" />
    <meta property="twitter:image:alt" content="Brew & Bloom Warm Coffee Shop Interior" />
    
    <!-- Performance: Preconnect to external domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- DNS prefetch for faster resolution -->
    <link rel="dns-prefetch" href="https://fonts.googleapis.com" />
    
    <!-- Performance: Preload critical assets -->
    <link rel="preload" as="image" href="/hero-bg.jpg" type="image/jpeg" fetchpriority="high" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☕%3C/text%3E%3C/svg%3E" />
    <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☕%3C/text%3E%3C/svg%3E" />
    
    <!-- Critical CSS inline for faster first paint -->
    <style>
      /* Critical CSS - inline for fastest render */
      html { scroll-behavior: auto; }
      body { 
        margin: 0; 
        background-color: #EAE4D9; 
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root { min-height: 100vh; }
      
      /* Prevent FOUC */
      .font-display, .font-body { opacity: 0; }
      .fonts-loaded .font-display, 
      .fonts-loaded .font-body { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Font loading optimization -->
    <script>
      // Mark fonts as loaded when they're available
      if (document.fonts) {
        document.fonts.ready.then(function() {
          document.documentElement.classList.add('fonts-loaded');
        });
      } else {
        // Fallback for older browsers
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
  </body>
</html>
