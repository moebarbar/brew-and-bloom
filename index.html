<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Brew & Bloom - Artisan coffee shop serving ethically sourced, freshly roasted coffee in a warm, welcoming atmosphere." />
    <meta name="theme-color" content="#EAE4D9" />
    
    <!-- Preconnect to Google Fonts for faster loading -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Preload critical hero image -->
    <link rel="preload" as="image" href="/hero-bg.jpg" type="image/jpeg" fetchpriority="high" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E☕%3C/text%3E%3C/svg%3E" />
    
    <title>Brew & Bloom | Artisan Coffee Shop</title>
    
    <!-- Critical CSS inline for faster first paint -->
    <style>
      /* Critical CSS - inline for fastest render */
      html { scroll-behavior: auto; }
      body { 
        margin: 0; 
        background-color: #EAE4D9; 
        font-family: system-ui, -apple-system, sans-serif;
      }
      #root { min-height: 100vh; }
      
      /* Prevent FOUC */
      .font-display, .font-body { opacity: 0; }
      .fonts-loaded .font-display, 
      .fonts-loaded .font-body { opacity: 1; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    
    <!-- Font loading optimization -->
    <script>
      // Mark fonts as loaded when they're available
      if (document.fonts) {
        document.fonts.ready.then(function() {
          document.documentElement.classList.add('fonts-loaded');
        });
      } else {
        // Fallback for older browsers
        document.documentElement.classList.add('fonts-loaded');
      }
    </script>
  </body>
</html>
